openapi: 3.1.0
info:
  title: Task Management API
  version: 1.0.0
  summary: Contract-first API for tracking personal or team tasks.
  description: |
    This OpenAPI document defines a small but production-ready task service.
    It demonstrates reusable component schemas, standardized error handling,
    and cursor-based pagination for list endpoints.
servers:
  - url: https://api.example.com/v1
    description: Production
  - url: https://sandbox-api.example.com/v1
    description: Sandbox

tags:
  - name: System
  - name: Tasks

paths:
  /health:
    get:
      tags: [System]
      summary: Health check
      operationId: getHealth
      responses:
        '200':
          description: Service is healthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthStatus'

  /tasks:
    get:
      tags: [Tasks]
      summary: List tasks
      operationId: listTasks
      parameters:
        - $ref: '#/components/parameters/CursorParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - in: query
          name: status
          description: Filter by task status.
          schema:
            $ref: '#/components/schemas/TaskStatus'
      responses:
        '200':
          description: A paginated list of tasks.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

    post:
      tags: [Tasks]
      summary: Create task
      operationId: createTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
            example:
              title: "Prepare monthly report"
              description: "Aggregate metrics and send summary to stakeholders."
              dueAt: "2026-04-22T18:00:00Z"
      responses:
        '201':
          description: Task created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'

  /tasks/{taskId}:
    parameters:
      - $ref: '#/components/parameters/TaskIdPathParam'

    get:
      tags: [Tasks]
      summary: Get task by id
      operationId: getTaskById
      responses:
        '200':
          description: Task found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      tags: [Tasks]
      summary: Update task
      operationId: updateTask
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTaskRequest'
      responses:
        '200':
          description: Task updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags: [Tasks]
      summary: Delete task
      operationId: deleteTask
      responses:
        '204':
          description: Task deleted.
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    TaskIdPathParam:
      in: path
      name: taskId
      required: true
      description: Unique identifier for a task.
      schema:
        type: string
        format: uuid

    CursorParam:
      in: query
      name: cursor
      required: false
      description: Cursor token from a prior list response.
      schema:
        type: string

    PageSizeParam:
      in: query
      name: pageSize
      required: false
      description: Number of records to return.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 25

  responses:
    BadRequest:
      description: Invalid request payload or query parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Requested resource does not exist.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    HealthStatus:
      type: object
      required: [status, timestamp]
      properties:
        status:
          type: string
          enum: [ok]
        timestamp:
          type: string
          format: date-time

    TaskStatus:
      type: string
      enum: [todo, in_progress, done]

    Task:
      type: object
      required: [id, title, status, createdAt, updatedAt]
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type: string
          maxLength: 2000
        status:
          $ref: '#/components/schemas/TaskStatus'
        dueAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateTaskRequest:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type: string
          maxLength: 2000
        dueAt:
          type: string
          format: date-time
      additionalProperties: false

    UpdateTaskRequest:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 120
        description:
          type: string
          maxLength: 2000
        status:
          $ref: '#/components/schemas/TaskStatus'
        dueAt:
          type: string
          format: date-time
      additionalProperties: false
      minProperties: 1

    TaskListResponse:
      type: object
      required: [data]
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Task'
        nextCursor:
          type: string
          nullable: true

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              examples: [INVALID_REQUEST]
            message:
              type: string
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  issue:
                    type: string
